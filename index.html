<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selfwork Operatori 4</title>
</head>
<body>

    <h1>Esercizio File di Gatti</h1>
    <p>Fai click con il tasto destro sulla pagina, seleziona "Ispeziona" e vai sulla scheda "Console" per vedere i risultati!</p>

    <script>
        // 1. Definiamo il numero totale di gatti e quanti gatti devono stare in ogni fila
        let gattiTotali = 44;
        let gattiInFila = 6;

        // 2. Calcoliamo il numero di file risultanti (arrotondando per difetto)
        let numeroFile = Math.floor(gattiTotali / gattiInFila);

        // 3. Calcoliamo quanti gatti rimangono fuori usando l'operatore modulo (%)
        let gattiAvanzati = gattiTotali % gattiInFila;

        // 4. Calcoliamo quanti gatti mancano per completare un'altra nuova fila
        let gattiMancanti = gattiInFila - gattiAvanzati;

        // 5. Stampiamo in console la frase esatta richiesta dalla traccia
        console.log("Ci sono " + numeroFile + " file di gatti e ne mancano " + gattiMancanti + " per una nuova fila, con un avanzo di " + gattiAvanzati);
    </script>
</body>
</html>
